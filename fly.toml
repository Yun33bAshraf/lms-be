app = 'lms-be'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  protocol = 'http'
  timeout = '5s'

[vm]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[deploy]
  release_command = 'dotnet ef database update'

[env]
  ASPNETCORE_ENVIRONMENT="Development"
