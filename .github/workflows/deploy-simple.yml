name: Deploy Simple

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: 'Environment to deploy to'
        required: true
        default: 'Development'
        type: choice
        options:
        - Development
        - Staging
        - Production

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environmentName }}

    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install .NET
      uses: actions/setup-dotnet@v4

    - name: Restore solution
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release
      
    - name: Test solution
      run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~AcceptanceTests"

    - name: Publish website
      run: |
        dotnet publish src/Web/Web.csproj --configuration Release --runtime win-x86 --self-contained --output ./publish
        cd publish
        zip -r ./publish.zip .
      working-directory: ./

    - name: Install Azure CLI
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - uses: azure/login@v2
      name: Login to Azure
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to Azure App Service
      run: |
        # Get the app service name based on environment
        if [ "${{ inputs.environmentName }}" == "Development" ]; then
          APP_NAME="lms-web-api-ddadcpgpe5gwc8gq"
        elif [ "${{ inputs.environmentName }}" == "Staging" ]; then
          APP_NAME="lms-web-api-staging"
        else
          APP_NAME="lms-web-api-production"
        fi
        
        echo "Deploying to app service: $APP_NAME"
        
        # Deploy using Azure CLI
        az webapp deployment source config-zip \
          --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }} \
          --name $APP_NAME \
          --src ./publish/publish.zip
        
        # Restart the app service
        az webapp restart \
          --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }} \
          --name $APP_NAME

    - name: Test deployment
      run: |
        # Wait for deployment to complete
        sleep 30
        
        # Get the app service name
        if [ "${{ inputs.environmentName }}" == "Development" ]; then
          APP_URL="https://lms-web-api-ddadcpgpe5gwc8gq.centralindia-01.azurewebsites.net"
        elif [ "${{ inputs.environmentName }}" == "Staging" ]; then
          APP_URL="https://lms-web-api-staging.centralindia-01.azurewebsites.net"
        else
          APP_URL="https://lms-web-api-production.centralindia-01.azurewebsites.net"
        fi
        
        echo "Testing deployment at: $APP_URL"
        
        # Test health endpoint
        curl -f $APP_URL/health || {
          echo "Health check failed, checking logs..."
          az webapp log tail \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }} \
            --name $APP_NAME \
            --max-events 50
          exit 1
        }
        
        echo "Deployment successful! Health check passed."

    - name: Get deployment URL
      run: |
        if [ "${{ inputs.environmentName }}" == "Development" ]; then
          echo "🚀 Deployment successful!"
          echo "📦 App URL: https://lms-web-api-ddadcpgpe5gwc8gq.centralindia-01.azurewebsites.net"
          echo "📖 Swagger: https://lms-web-api-ddadcpgpe5gwc8gq.centralindia-01.azurewebsites.net/swagger"
        elif [ "${{ inputs.environmentName }}" == "Staging" ]; then
          echo "🚀 Staging deployment successful!"
          echo "📦 App URL: https://lms-web-api-staging.centralindia-01.azurewebsites.net"
          echo "📖 Swagger: https://lms-web-api-staging.centralindia-01.azurewebsites.net/swagger"
        else
          echo "🚀 Production deployment successful!"
          echo "📦 App URL: https://lms-web-api-production.centralindia-01.azurewebsites.net"
          echo "📖 Swagger: https://lms-web-api-production.centralindia-01.azurewebsites.net/swagger"
        fi
